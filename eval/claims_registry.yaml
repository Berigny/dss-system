# Claims registry for README.md and whitepaper assertions.
# Every public claim must map to a producing harness, measured quantity, status,
# and evidence link. CI fails if a README claim lacks a registry entry.

schema_version: "1.0"
last_reviewed: "2026-07-19"

claims:
  - id: C01
    source: README.md
    quote: "In the current benchmark harness, DSS achieves Recall@1 of 1.00 at 517K tokens"
    claim: Recall@1 equals 1.00 on a 517K-token synthetic micro-corpus.
    harness: apps/backend/backend/benchmarks/comparison_benchmark.py
    measurement: Recall@1 across needle-retrieval seeds
    status: overclaimed-as-framed
    evidence: eval/reports/2026-07-18_13ad50b5782d4069_v0.4/acceptance_report.md
    caveats:
      - Synthetic micro-corpus, not unstructured enterprise data.
      - Comparator is a deterministic stand-in, not a live vector database.

  - id: C02
    source: README.md
    quote: "reported as a distribution across a pinned seed set"
    claim: Needle benchmark is run across a pinned seed set with distribution statistics.
    harness: tools/seed_distribution_harness.py
    measurement: Per-seed recall, mean, CI95, min/max, n
    status: supported
    evidence: eval/reports/benchmarks/seed_distribution_20260718T113124Z_25ac629610a4.json

  - id: C03
    source: README.md
    quote: "Multi-hop synthetic | **1.00** full-chain@5 | real MiniLM: 1.00"
    claim: Multi-hop retrieval achieves full-chain@5 of 1.00 on a synthetic corpus; the real MiniLM comparator also scores 1.00 on this corpus (parity, no differentiation claimed).
    harness: tools/counterfactual_harness.py
    measurement: multihop_original_qp_chain_recall
    status: supported
    evidence: eval/reports/benchmarks/counterfactual_baselines_20260719T064215Z_16bcd79deceb.json

  - id: C04
    source: README.md
    quote: "vector 0%"
    claim: DSS retrieval does not rely on vector similarity.
    harness: apps/backend/backend/ingestion/pipeline.py
    measurement: Coordinate derivation and prime-factor lookup do not call embedding similarity.
    status: supported
    evidence: backend/kernel/decode.py

  - id: C05
    source: README.md
    quote: "Swap Models Seamlessly"
    claim: Model swaps do not lose ongoing conversational context.
    harness: apps/backend/backend/api/chat.py
    measurement: Conversation continuity across OpenRouter model switches
    status: pending
    evidence: manual/integration tests

  - id: C06
    source: README.md
    quote: "DSS locates compatible records using an $O(k \\log n)$ composite prime lookup"
    claim: Record lookup is O(k log n) in the number of records.
