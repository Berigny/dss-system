  - id: C20
    source: DSS-295 benchmark
    quote: "Measured wall-clock p50/p95 latency and bytes-per-event for DSS, MiniLM, HNSW, BM25, metadata-filter, and BoW across corpus sizes"
    claim: DSS latency and storage costs are measured and reported with honest extrapolation labels.
    harness: apps/backend/backend/benchmarks/dss295_latency_storage_benchmark.py
    measurement: p50_latency_ms, p95_latency_ms, bytes_per_event across 1 k/10 k/100 k event buckets
    status: supported
    evidence: eval/reports/benchmarks/dss_v0.5_20260720T182139Z/dss295-latency-storage_aggregate.json
    caveats:
      - "1 k, 10 k, and 100 k buckets are measured directly in the full run (3 seeds, 50 query iterations, 5 warmup iterations)."
      - "Extrapolated rows, when present, are explicitly labelled and use constant per-event storage (sqrt latency scaling)."
      - "When skip_real_embedding is true (smoke/CI runs), the real_embedding and hnsw_dense latencies are mocked and exclude model-load and real encoding cost; this explains order-of-magnitude swings between smoke and full runs."
      - "Synthetic LongBench needle corpus; enterprise data may differ."

