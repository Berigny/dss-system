    measurement: Theoretical complexity of prime-sorted coordinate lookup
    status: supported
    evidence: docs/decisions/D1-core-only-graceful-degradation.md

  - id: C07
    source: README.md
    quote: "abstains rather than guesses when structural verification fails"
