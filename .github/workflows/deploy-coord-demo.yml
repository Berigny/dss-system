name: Deploy coord-demo

on:
  push:
    branches: [main]
    paths:
      - 'apps/coord-demo/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-coord-demo.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: echo "Vercel deploy step for apps/coord-demo/ (TBD)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_COORD_DEMO }}
