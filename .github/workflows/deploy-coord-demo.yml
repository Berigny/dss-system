name: Deploy coord-demo

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/coord-demo/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-coord-demo.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Configure Vercel CLI auth
        run: |
          mkdir -p "$HOME/.vercel-cli-auth"
          echo '${{ secrets.VERCEL_AUTH_JSON }}' > "$HOME/.vercel-cli-auth/auth.json"

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        working-directory: ./apps/coord-demo
        run: vercel --global-config "$HOME/.vercel-cli-auth" --yes --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_COORD_DEMO }}

      - name: Deploy to Vercel (preview)
        if: github.ref == 'refs/heads/develop'
        working-directory: ./apps/coord-demo
        run: vercel --global-config "$HOME/.vercel-cli-auth" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_COORD_DEMO }}
