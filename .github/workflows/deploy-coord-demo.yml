name: Deploy coord-demo

on:
  push:
    branches: [main]
    paths:
      - 'apps/coord-demo/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-coord-demo.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel production deploy hook
        run: |
          HTTP_CODE=$(curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_COORD_DEMO }}" \
            -o /tmp/vercel-response.json \
            -w "%{http_code}")
          cat /tmp/vercel-response.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for Vercel deployment to propagate
        run: |
          EXPECTED="${GITHUB_SHA}"
          URL="https://decode.dualsubstrate.com/health"
          for i in $(seq 1 30); do
            SHA=$(curl -sS --fail "$URL" | python -c "import sys,json; print(json.load(sys.stdin).get('commit_sha',''))" 2>/dev/null || true)
            if [ "$SHA" = "$EXPECTED" ]; then
              echo "Deployment propagated: $SHA"
              exit 0
            fi
            echo "Waiting for deployment... attempt $i, got commit_sha='${SHA:-unknown}'"
            sleep 10
          done
          echo "Deployment did not propagate within timeout"
          exit 1
