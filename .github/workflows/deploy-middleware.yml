name: Deploy middleware

on:
  push:
    branches: [main]
    paths:
      - 'apps/middleware/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-middleware.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Fly.io
        run: echo "Fly.io deploy step for apps/middleware/ (TBD)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
