name: Deploy chat-surface

on:
  push:
    branches: [main]
    paths:
      - 'apps/chat-surface/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-chat-surface.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: echo "Vercel deploy step for apps/chat-surface/ (TBD)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CHAT_SURFACE }}
