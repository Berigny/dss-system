name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      middleware: ${{ steps.filter.outputs.middleware }}
      control-plane: ${{ steps.filter.outputs.control-plane }}
      chat-surface: ${{ steps.filter.outputs.chat-surface }}
      coord-demo: ${{ steps.filter.outputs.coord-demo }}
      shared-types: ${{ steps.filter.outputs.shared-types }}
      ksr: ${{ steps.filter.outputs.ksr }}
      eval: ${{ steps.filter.outputs.eval }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            middleware:
              - 'apps/middleware/**'
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            control-plane:
              - 'apps/control-plane/**'
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            chat-surface:
              - 'apps/chat-surface/**'
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            coord-demo:
              - 'apps/coord-demo/**'
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            shared-types:
              - 'packages/shared-types/**'
              - '.github/workflows/ci.yml'
            ksr:
              - 'ksr/**'
              - 'tools/ksr_*'
              - 'scripts/pub1_esoteric_scan.py'
              - 'scripts/pub1_esoteric_lexicon.txt'
              - 'scripts/check_readme_claims.py'
              - 'eval/claims_registry.yaml'
              - 'README.md'
              - '.github/workflows/ci.yml'
            eval:
              - 'eval/**'
              - 'apps/backend/backend/benchmarks/dss29*.py'
              - 'apps/backend/backend/tests/test_dss29*.py'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required scaffold files exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f .env.example
          test -f Makefile
          test -f docker-compose.yml
          test -f .gitignore
          test -d .github/workflows
          test -d apps/backend
          test -d apps/middleware
          test -d apps/did-issuer
          test -d apps/control-plane
          test -d apps/chat-surface
          test -d apps/coord-demo
          test -d packages/shared-types
          test -d infra/staging
          test -d infra/prod
          test -d docs

      - name: Validate docker-compose syntax
        run: |
          cp .env.example .env
          docker compose config
  shared-types:
    needs: changes
    if: ${{ needs.changes.outputs.shared-types == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install shared-types
        run: |
          pip install -e ./packages/shared-types
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check packages/shared-types/shared_types || true
      - name: Test
        run: |
          cd packages/shared-types
          pytest -q

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./packages/shared-types
          cd apps/backend
          pip install -r requirements.txt
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/backend/backend || true
      - name: Test
        env:
          OPENAI_API_KEY: "dummy-key-for-ci-tests"
        run: |
          cd apps/backend
          pytest -q

  middleware:
    needs: changes
    if: ${{ needs.changes.outputs.middleware == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./packages/shared-types
          cd apps/middleware
          pip install -r requirements.txt
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/middleware || true
      - name: Test
        run: |
          cd apps/middleware
          pytest -q

  control-plane:
    needs: changes
    if: ${{ needs.changes.outputs.control-plane == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./packages/shared-types
          cd apps/control-plane
          pip install -r requirements.txt
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/control-plane || true
      - name: Test
        run: |
          cd apps/control-plane
          pytest -q

  chat-surface:
    needs: changes
    if: ${{ needs.changes.outputs.chat-surface == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./packages/shared-types
          cd apps/chat-surface
          pip install -r requirements.txt
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/chat-surface || true
      - name: Test
        run: |
          cd apps/chat-surface
          pytest -q

  coord-demo:
    needs: changes
    if: ${{ needs.changes.outputs.coord-demo == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./packages/shared-types
          cd apps/coord-demo
          pip install -r requirements.txt
          pip install pytest
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/coord-demo || true
      - name: Test
        run: |
          cd apps/coord-demo
          pytest -q

  ksr-validate:
    needs: changes
    if: ${{ needs.changes.outputs.ksr == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate ksr-core
        run: python3 tools/ksr_validate.py --mode core ksr/core/ksr-core-1.3.1.yaml --repo-root .
      - name: Validate ksr-pack-domains
        run: python3 tools/ksr_validate.py --mode pack ksr/pack/ksr-pack-domains-1.3.1.yaml
      - name: Validate ksr-pack-steward
        run: python3 tools/ksr_validate.py --mode pack ksr/pack/ksr-pack-steward-1.3.1.yaml

  pub1-esoteric-scan:
    needs: changes
    if: ${{ needs.changes.outputs.ksr == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: PUB-1 esoteric-content scan
        run: python3 scripts/pub1_esoteric_scan.py

  readme-claims:
    needs: changes
    if: ${{ needs.changes.outputs.ksr == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Check README claims are registered
        run: python3 scripts/check_readme_claims.py

  eval:
    needs: changes
    if: ${{ needs.changes.outputs.eval == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run eval container (dry-run)
        run: make eval-fast

      - name: Verify eval artifacts
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys
          sys.path.insert(0, 'apps/backend')
          sys.path.insert(0, 'packages/shared-types/src')
          from backend.benchmarks.artifact_schema import validate_benchmark_artifact

          reports = pathlib.Path('eval/reports/benchmarks')
          run_dirs = sorted(d for d in reports.iterdir() if d.is_dir() and d.name.startswith('dss_v0.5_'))
          assert run_dirs, f'No eval run directory found under {reports}'
          run_dir = run_dirs[-1]
          summary = json.loads((run_dir / 'summary_manifest.json').read_text())
          assert summary['benchmarks'], 'No benchmarks recorded in summary manifest'
          for b in summary['benchmarks']:
              assert b['status'] == 'success', f"Benchmark {b['suite']} did not succeed"

          aggregate_files = list(run_dir.glob('*_aggregate.json'))
          assert len(aggregate_files) >= 6, f'Expected at least 6 aggregate artifacts, found {len(aggregate_files)}'
          for artifact_file in aggregate_files:
              payload = json.loads(artifact_file.read_text())
              validate_benchmark_artifact(payload)
              print(f"VALID: {artifact_file.name}")
          print('All eval artifacts validated.')
          PY
