name: Deploy backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Deploy to Fly.io (production)
        if: github.ref == 'refs/heads/main'
        run: |
          export FLYCTL_INSTALL="$HOME/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"
          flyctl deploy . --app dss-system-backend --dockerfile apps/backend/Dockerfile --access-token ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io (staging)
        if: github.ref == 'refs/heads/develop'
        run: |
          export FLYCTL_INSTALL="$HOME/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"
          flyctl deploy . --app dss-system-backend-staging --dockerfile apps/backend/Dockerfile --access-token ${{ secrets.FLY_API_TOKEN }}
