name: Fly Deploy (Backend)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: fly-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_APP: ${{ vars.FLY_APP || 'ds-backend-new' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Re-encrypt KSR for deployment
        run: |
          pip install --quiet -r requirements.txt
          python scripts/encrypt_ksr.py
        env:
          DSS_KSR_PASSWORD: ${{ secrets.DSS_KSR_PASSWORD }}

      - name: Verify Fly app access
        run: |
          set -euo pipefail
          echo "Using FLY_APP=${FLY_APP}"
          if ! flyctl status -a "$FLY_APP" >/tmp/fly-status.txt 2>&1; then
            echo "::error::Cannot access Fly app '$FLY_APP' with current FLY_API_TOKEN."
            echo "Set repository variable FLY_APP and verify repository secret FLY_API_TOKEN."
            cat /tmp/fly-status.txt
            exit 1
          fi
          sed -n '1,40p' /tmp/fly-status.txt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Stamp runtime git SHA secret
        run: flyctl secrets set -a "$FLY_APP" GIT_SHA="${GITHUB_SHA}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy image
        run: flyctl deploy -a "$FLY_APP" --remote-only --build-arg "GIT_SHA=${GITHUB_SHA}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployed SHA from /health
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          app = os.environ["FLY_APP"].strip()
          expected = os.environ["GITHUB_SHA"].strip()
          url = f"https://{app}.fly.dev/health"
          deadline = time.time() + 240
          last = None
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                  last = data
                  sha = str(data.get("git_sha") or "").strip()
                  if sha == expected:
                      print(f"OK /health git_sha={sha}")
                      raise SystemExit(0)
              except Exception as exc:
                  last = {"error": str(exc)}
              time.sleep(5)
          raise SystemExit(f"Deployed SHA mismatch. expected={expected} observed={last}")
          PY
