name: MMF Certification (Backend)

on:
  pull_request:
    paths:
      - "backend/fieldx_kernel/mmf_foundation.py"
      - "backend/fieldx_kernel/e6_packet.py"
      - "backend/tests/test_mmf_foundation.py"
      - "backend/tests/test_e6_packet.py"
      - "requirements.txt"
      - ".github/workflows/mmf-certification.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "backend/fieldx_kernel/mmf_foundation.py"
      - "backend/fieldx_kernel/e6_packet.py"
      - "backend/tests/test_mmf_foundation.py"
      - "backend/tests/test_e6_packet.py"
      - "requirements.txt"
      - ".github/workflows/mmf-certification.yml"

jobs:
  mmf-certification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Assert MMF face map and print audit trace
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          import json
          from backend.fieldx_kernel.mmf_foundation import MMF_DOMAIN_FACE_MAP, validate_domain_face_map

          normalized = validate_domain_face_map(MMF_DOMAIN_FACE_MAP)
          print("MMF domain->face mapping (validated):")
          print(json.dumps(normalized, indent=2, sort_keys=True))
          PY

      - name: Run MMF certification suite
        env:
          PYTHONPATH: .
        run: |
          mkdir -p artifacts
          pytest -q \
            backend/tests/test_mmf_foundation.py \
            backend/tests/test_e6_packet.py \
            --junitxml=artifacts/backend-mmf-certification-junit.xml

      - name: Upload MMF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-mmf-certification-artifacts
          path: |
            artifacts/backend-mmf-certification-junit.xml
