# fly.toml app configuration for dss-system/apps/backend
# See https://fly.io/docs/reference/configuration/

app = 'dss-system-backend'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data"

[processes]
  app = "uvicorn backend.main:app --host 0.0.0.0 --port 8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '5s'

[[mounts]]
  source = "backend_data"
  destination = "/data"
  processes = ["app"]

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
