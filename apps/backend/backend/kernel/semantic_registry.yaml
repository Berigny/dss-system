  flow_rules:
  - Even sinks route to the centroid through edge/face intermediates.
  - Centroid routes only to odd branches (K1, K3, K5, K7).
  - Non-terminal odd branches emit forward along the active layer.
  - Terminal branches fork (stay in tier or cross via a bridge edge).
  - Backflow is illegal except terminal wrap resets.
