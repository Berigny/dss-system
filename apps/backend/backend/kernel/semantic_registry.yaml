          patristic_reference: Gregory of Nyssa, Contra Eunomium — The 'nothing' from which God creates is not a pre-existing substrate but the absolute ground of divine will; also Origen on the pre-cosmic state of souls before the primordial fall into materiality
          rabbinic_reference: Sefer Yetzirah 1:1 — 'With thirty-two wondrous paths of wisdom Yah YHVH Elohim Sabaoth engraved and created His world'; Zohar I:15a on the state of Ein Sof before tzimtzum as pure potentiality
          concept: The pre-creational void as the womb of all manifestation; tohu vavohu as not mere emptiness but pregnant darkness; the point of pure divine self-containment before the utterance of light
          confidence: H
          relation_type: ANALOGY
          steward_only: true
        mysticism:
          gnostic_concept: The Pleroma as fullness prior to emanation; the Invisible Spirit in the Apocryphon of John as the boundless source before the appearance of Barbelo; the pre-cosmic unity described in the Tripartite Tractate
          sufi_concept: Fana fi'l-ahad — annihilation in the absolute One preceding even the distinction of attributes; Ibn Arabi's concept of the 'immutable entities' (a'yan thabita) in their state of pure latency before cosmic manifestation; the state of Ahmad-before-the-letters
