ksr_scope_statement: The DSS Kernel is a coherence protocol, not a knowledge base. It verifies structural consistency across domains using 27 geometric invariants, not factual accuracy. Knowledge itself lives in external vector stores, knowledge graphs, and language models; the kernel checks whether that knowledge violates geometric constraints.
confidence_taxonomy:
  S: Structural — mathematical identity or provable isomorphism
  A: Archetypal — independently observed across three or more traditions
  E: Empirical — verifiable within a domain discipline
  P: Poetic — metaphorical resonance, steward-only
  H: Heuristic — working hypothesis, steward-only
relation_types:
- IDENTITY
- ISOMORPHISM
- ANALOGY
- METAPHOR
