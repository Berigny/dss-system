waltIdBaseUrl = "http://localhost:8080"
waltIdBaseUrl = ${?WALT_ID_BASE_URL}

dssLogoUrl = "https://id.dualsubstrate.com/assets/dss-logo.png"
dssLogoUrl = ${?DSS_LOGO_URL}

supportedCredentialTypes = {
    "DssIdentity_jwt_vc_json" = {
        format = "jwt_vc_json"
        cryptographic_binding_methods_supported = ["did:web", "did:jwk", "jwk"]
        credential_signing_alg_values_supported = ["EdDSA", "ES256", "ES256K", "RSA"]
        proof_types_supported = {
            jwt = {
                proof_signing_alg_values_supported = ["EdDSA", "ES256", "ES256K", "RSA"]
            }
        }
        credential_definition = {
            type = ["VerifiableCredential", "DssIdentity"]
        }
        display = [
            {
                name = "Dual Substrate Identity"
                locale = "en"
                logo = {
                    url = ${dssLogoUrl}
                    alt_text = "Dual Substrate Identity"
                }
                description = "Dual Substrate DSS Identity Credential"
                background_color = "#1a1a2e"
                text_color = "#ffffff"
            }
        ]
    }
    "DssIdentity_jwt_vc_json-ld" = {
        format = "jwt_vc_json-ld"
