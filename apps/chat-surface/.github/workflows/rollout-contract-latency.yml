name: Rollout Contract And Latency (Frontend)

on:
  pull_request:
    paths:
      - "tests/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/rollout-contract-latency.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "tests/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/rollout-contract-latency.yml"

jobs:
  frontend-rollout-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run rollout suites
        run: |
          mkdir -p artifacts
          pytest -q \
            tests/test_orchestrator_consumer_pipeline.py \
            tests/test_pipeline_event_overhead.py \
            --junitxml=artifacts/frontend-rollout-junit.xml

      - name: Emit latency baseline artifact
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          source = Path("app.py").read_text(encoding="utf-8")

          def read_int(name: str, default: int):
              m = re.search(rf"^{name}\s*=\s*([0-9]+)", source, flags=re.M)
              return int(m.group(1)) if m else default

          baseline = {
              "suite": "frontend_rollout",
              "pipeline": {
                  "max_pipeline_events": read_int("MAX_PIPELINE_EVENTS", 64),
                  "walk_metric_stride_default": read_int("PIPELINE_WALK_METRIC_STRIDE", 2),
              },
              "tests": [
                  "tests/test_orchestrator_consumer_pipeline.py",
                  "tests/test_pipeline_event_overhead.py",
              ],
          }

          out = Path("artifacts/frontend-latency-baseline.json")
          out.write_text(json.dumps(baseline, indent=2) + "\n", encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY

      - name: Upload rollout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-rollout-artifacts
          path: |
            artifacts/frontend-rollout-junit.xml
            artifacts/frontend-latency-baseline.json
