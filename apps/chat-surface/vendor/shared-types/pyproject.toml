[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shared-types"
version = "0.1.0"
description = "Shared types and clients for dss-system apps"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.25.0",
]

[tool.hatch.build.targets.wheel]
packages = ["shared_types"]
