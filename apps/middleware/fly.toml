# fly.toml app configuration for dss-system/apps/middleware
# See https://fly.io/docs/reference/configuration/

app = 'dss-system-middleware'
primary_region = 'syd'

[build]

[env]
  APP_MODE = "fastapi"
  QP_PURE_ENABLED = "true"
  ORCHESTRATOR_CONTEXT_GATE_THRESHOLD = "0.5"
  DUALSUBSTRATE_API = "https://dss-system-backend.fly.dev"
  MIDDLEWARE_PUBLIC_BASE_URL = "https://dss-system-middleware.fly.dev"
  WALT_ID_ISSUER_URL = "https://dss-system-did-issuer.fly.dev"
  WALT_ID_ISSUER_DID = "did:web:id.dualsubstrate.com"
  PRINCIPAL_REGISTRY_PATH = "/app/data/principal_registry.json"
  PRINCIPAL_LINK_CHALLENGES_PATH = "/app/data/principal_link_challenges.json"
  DEFAULT_LEDGER_ID = "loam-root-01"

[processes]
  app = "uvicorn src.main:app --host 0.0.0.0 --port 8001"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '5s'

[[mounts]]
  source = "middleware_data"
  destination = "/app/data"
  processes = ["app"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
