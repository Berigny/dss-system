# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    env:
      FLY_APP: ${{ vars.FLY_APP || 'ds-middleware-new' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Verify Fly app access
        run: |
          set -euo pipefail
          echo "Using FLY_APP=${FLY_APP}"
          if ! flyctl status -a "$FLY_APP" >/tmp/fly-status.txt 2>&1; then
            echo "::error::Cannot access Fly app '$FLY_APP' with current FLY_API_TOKEN."
            echo "Set repository variable FLY_APP and verify repository secret FLY_API_TOKEN."
            cat /tmp/fly-status.txt
            exit 1
          fi
          sed -n '1,40p' /tmp/fly-status.txt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Stamp runtime git SHA secret
        run: flyctl secrets set -a "$FLY_APP" GIT_SHA="${GITHUB_SHA}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy
        run: flyctl deploy -a "$FLY_APP" --remote-only --build-arg "GIT_SHA=${GITHUB_SHA}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Verify /health git_sha
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          app = os.environ["FLY_APP"].strip()
          expected = os.environ["GITHUB_SHA"].strip()
          url = f"https://{app}.fly.dev/health"
          deadline = time.time() + 240
          observed = None
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                  observed = str(data.get("git_sha") or "").strip()
                  if observed == expected:
                      print(f"OK /health git_sha={observed}")
                      raise SystemExit(0)
              except Exception:
                  pass
              time.sleep(5)
          raise SystemExit(f"Deployed SHA mismatch. expected={expected} observed={observed}")
          PY
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
