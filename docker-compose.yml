services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dss-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - backend-data:/data
    networks:
      - dss-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  did-issuer:
    build: ./apps/did-issuer
    container_name: dss-did-issuer
    ports:
      - "8080:8080"
    env_file: .env
    networks:
      - dss-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/livez >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  middleware:
    build:
      context: .
      dockerfile: apps/middleware/Dockerfile
    container_name: dss-middleware
    ports:
      - "8001:8001"
    env_file: .env
    networks:
      - dss-network
    depends_on:
      backend:
        condition: service_healthy
      did-issuer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    container_name: dss-control-plane
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - dss-network
    depends_on:
      middleware:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-surface:
    build:
      context: .
      dockerfile: apps/chat-surface/Dockerfile
    container_name: dss-chat-surface
    ports:
      - "3001:3001"
    env_file: .env
    networks:
      - dss-network
    depends_on:
      middleware:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  coord-demo:
    build:
      context: .
      dockerfile: apps/coord-demo/Dockerfile
    container_name: dss-coord-demo
    ports:
      - "3002:3002"
    env_file: .env
    networks:
      - dss-network
    depends_on:
      middleware:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  backend-data:
    driver: local

networks:
  dss-network:
    driver: bridge
